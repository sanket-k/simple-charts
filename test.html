<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovator's Dilemma Chart Generator</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f9fafb;
            color: #333;
        }
        .sidebar {
            width: 350px;
            background-color: #ffffff;
            padding: 24px;
            border-right: 1px solid #e5e7eb;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chart-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
            aspect-ratio: 4 / 3;
        }
        h2 { margin-top: 0; font-size: 1.25rem; margin-bottom: 20px; }
        .control-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 6px; color: #4b5563; }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.875rem;
        }
        input[type="range"] { width: 100%; }
        hr { border: 0; border-top: 1px solid #e5e7eb; margin: 24px 0; }
        
        /* SVG Styling */
        .axis path, .axis line { stroke: #9ca3af; }
        .axis text { fill: #6b7280; font-size: 14px; font-weight: bold; }
        .tier-line { stroke: #9ca3af; stroke-width: 2; fill: none; }
        .tier-text { fill: #9ca3af; font-size: 12px; }
        .incumbent-line { stroke: #3b82f6; stroke-width: 3; fill: none; }
        .incumbent-text { fill: #3b82f6; font-size: 14px; font-weight: bold; }
        .disrupt-line { stroke: #ef4444; stroke-width: 3; fill: none; }
        .disrupt-text { fill: #ef4444; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Chart Controls</h2>
        
        <div class="control-group">
            <label>Pace of Sustaining Innovation (Slope)</label>
            <input type="range" id="sustainSlope" min="0.1" max="0.8" step="0.05" value="0.3">
        </div>
        <div class="control-group">
            <label>Pace of Disruption (Curve)</label>
            <input type="range" id="disruptPace" min="0.005" max="0.03" step="0.001" value="0.015">
        </div>

        <hr>

        <div class="control-group">
            <label>X-Axis Label</label>
            <input type="text" id="xAxisLabel" value="Time">
        </div>
        <div class="control-group">
            <label>Y-Axis Label</label>
            <input type="text" id="yAxisLabel" value="Performance / Quality">
        </div>

        <hr>

        <div class="control-group">
            <label>Tier 4 (Premium)</label>
            <input type="text" id="tier4Label" value="Sheet steel">
        </div>
        <div class="control-group">
            <label>Tier 3 (High-end)</label>
            <input type="text" id="tier3Label" value="Structural steel">
        </div>
        <div class="control-group">
            <label>Tier 2 (Mid-market)</label>
            <input type="text" id="tier2Label" value="Other bars and rods">
        </div>
        <div class="control-group">
            <label>Tier 1 (Low-end)</label>
            <input type="text" id="tier1Label" value="Rebar">
        </div>

        <hr>

        <div class="control-group">
            <label>Incumbent Tech Label</label>
            <input type="text" id="incumbentLabel" value="Integrated Mills">
        </div>
        <div class="control-group">
            <label>Disruptive Tech Label</label>
            <input type="text" id="disruptLabel" value="Quality of minimill steel">
        </div>
    </div>

    <div class="main-content">
        <div class="chart-container" id="chart-wrap">
            <svg id="chart" width="100%" height="100%"></svg>
        </div>
    </div>

    <script>
        // Setup SVG
        const svg = d3.select("#chart");
        let width, height;
        const margin = {top: 20, right: 40, bottom: 40, left: 50};

        // Add arrow markers to SVG
        const defs = svg.append("defs");
        const createMarker = (id, color) => {
            defs.append("marker")
                .attr("id", id)
                .attr("viewBox", "0 -5 10 10")
                .attr("refX", 8)
                .attr("refY", 0)
                .attr("markerWidth", 6)
                .attr("markerHeight", 6)
                .attr("orient", "auto")
                .append("path")
                .attr("d", "M0,-5L10,0L0,5")
                .attr("fill", color);
        };
        createMarker("arrow-gray", "#9ca3af");
        createMarker("arrow-blue", "#3b82f6");
        createMarker("arrow-red", "#ef4444");
        createMarker("arrow-axis", "#9ca3af");

        // Groups for drawing
        const gAxis = svg.append("g");
        const gLines = svg.append("g");
        const gLabels = svg.append("g");

        function updateChart() {
            // Get dimensions dynamically
            const container = document.getElementById("chart-wrap");
            width = container.clientWidth - margin.left - margin.right;
            height = container.clientHeight - margin.top - margin.bottom;

            // Clear previous elements
            gAxis.selectAll("*").remove();
            gLines.selectAll("*").remove();
            gLabels.selectAll("*").remove();

            gAxis.attr("transform", `translate(${margin.left},${margin.top})`);
            gLines.attr("transform", `translate(${margin.left},${margin.top})`);
            gLabels.attr("transform", `translate(${margin.left},${margin.top})`);

            // Scales
            const xScale = d3.scaleLinear().domain([0, 100]).range([0, width]);
            const yScale = d3.scaleLinear().domain([0, 120]).range([height, 0]);

            // Draw Axes
            gAxis.append("line")
                .attr("x1", 0).attr("y1", height).attr("x2", width).attr("y2", height)
                .attr("stroke", "#9ca3af").attr("stroke-width", 2)
                .attr("marker-end", "url(#arrow-axis)");
            
            gAxis.append("line")
                .attr("x1", 0).attr("y1", height).attr("x2", 0).attr("y2", 0)
                .attr("stroke", "#9ca3af").attr("stroke-width", 2)
                .attr("marker-end", "url(#arrow-axis)");

            // Axis Labels
            gAxis.append("text")
                .attr("x", width / 2).attr("y", height + 35)
                .attr("text-anchor", "middle").attr("class", "axis text")
                .text(document.getElementById("xAxisLabel").value);
            
            gAxis.append("text")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2).attr("y", -35)
                .attr("text-anchor", "middle").attr("class", "axis text")
                .text(document.getElementById("yAxisLabel").value);

            // Get Input Values
            const slope = parseFloat(document.getElementById("sustainSlope").value);
            const disruptPace = parseFloat(document.getElementById("disruptPace").value);
            
            // Define Line Data Generator
            const lineGen = d3.line()
                .x(d => xScale(d.x))
                .y(d => yScale(d.y));

            // Generate X points
            const xPoints = d3.range(5, 95, 2);

            // 1. Sustaining Tiers (y = mx + b)
            const tiers = [
                { id: "tier1", startY: 15, text: document.getElementById("tier1Label").value },
                { id: "tier2", startY: 35, text: document.getElementById("tier2Label").value },
                { id: "tier3", startY: 55, text: document.getElementById("tier3Label").value },
                { id: "tier4", startY: 75, text: document.getElementById("tier4Label").value }
            ];

            // Calculate rotation angle for labels based on visual slope
            const p1 = {x: xScale(0), y: yScale(0)};
            const p2 = {x: xScale(10), y: yScale(slope * 10)};
            const visualSlope = (p2.y - p1.y) / (p2.x - p1.x);
            const angle = Math.atan(visualSlope) * (180 / Math.PI);

            tiers.forEach(tier => {
                const data = xPoints.map(x => ({ x: x, y: slope * x + tier.startY }));
                
                gLines.append("path")
                    .datum(data)
                    .attr("class", "tier-line")
                    .attr("d", lineGen)
                    .attr("marker-end", "url(#arrow-gray)");

                // Place label near the end of the line
                const labelX = 75; 
                const labelY = slope * labelX + tier.startY;
                
                gLabels.append("text")
                    .attr("class", "tier-text")
                    .attr("x", xScale(labelX))
                    .attr("y", yScale(labelY) - 8)
                    .attr("transform", `rotate(${angle}, ${xScale(labelX)}, ${yScale(labelY)})`)
                    .text(tier.text);
            });

            // 2. Incumbent Technology
            // Follows a trajectory slightly above the highest tier
            const incumbentData = xPoints.map(x => ({ x: x, y: slope * x + 85 }));
            gLines.append("path")
                .datum(incumbentData)
                .attr("class", "incumbent-line")
                .attr("d", lineGen)
                .attr("stroke-dasharray", "5,5") // Dashed line to distinguish
                .attr("marker-end", "url(#arrow-blue)");

            gLabels.append("text")
                .attr("class", "incumbent-text")
                .attr("x", xScale(70))
                .attr("y", yScale(slope * 70 + 85) - 10)
                .attr("transform", `rotate(${angle}, ${xScale(70)}, ${yScale(slope * 70 + 85)})`)
                .text(document.getElementById("incumbentLabel").value);

            // 3. Disruptive Technology (y = a*x^2 + b)
            const disruptData = xPoints.map(x => ({ x: x, y: disruptPace * Math.pow(x, 2) + 5 }))
                                       .filter(d => d.y <= 115); // Stop drawing if it goes off top chart
            
            gLines.append("path")
                .datum(disruptData)
                .attr("class", "disrupt-line")
                .attr("d", lineGen)
                .attr("marker-end", "url(#arrow-red)");

            // Disruptive Label positioning
            const dLabelX = 30;
            const dLabelY = disruptPace * Math.pow(dLabelX, 2) + 5;
            
            // Calculate steep visual angle for disruptive curve at that specific point
            const dP1 = {x: xScale(dLabelX), y: yScale(dLabelY)};
            const dP2 = {x: xScale(dLabelX + 5), y: yScale(disruptPace * Math.pow(dLabelX + 5, 2) + 5)};
            const dVisualSlope = (dP2.y - dP1.y) / (dP2.x - dP1.x);
            const dAngle = Math.atan(dVisualSlope) * (180 / Math.PI);

            gLabels.append("text")
                .attr("class", "disrupt-text")
                .attr("x", xScale(dLabelX) - 10)
                .attr("y", yScale(dLabelY) - 15)
                .attr("transform", `rotate(${dAngle}, ${xScale(dLabelX)}, ${yScale(dLabelY)})`)
                .text(document.getElementById("disruptLabel").value);
        }

        // Attach event listeners to all inputs to trigger redraw
        document.querySelectorAll("input").forEach(input => {
            input.addEventListener("input", updateChart);
        });

        // Handle window resize
        window.addEventListener("resize", updateChart);

        // Initial draw
        updateChart();
    </script>
</body>
</html>
